<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Success</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 0; background: #f6f7f9; color: #0f172a; }
      main { min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; }
      .card { width: 100%; max-width: 480px; background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 28px; box-shadow: 0 10px 30px rgba(2, 8, 23, 0.08); text-align: center; }
      .title { font-size: 22px; font-weight: 700; margin: 0 0 10px 0; }
      .subtitle { color: #6b7280; margin: 0 0 18px 0; }
      .btn { display: inline-block; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(37, 99, 235, 0.8); background: linear-gradient(180deg, #2563eb, #1d4ed8); color: #fff; font-weight: 600; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1 class="title">User logged in successfully</h1>
        <p class="subtitle">Welcome back! You can now continue.</p>
        <a class="btn" href="/">Go to app</a>
      </section>
    </main>
  </body>
  </html>
